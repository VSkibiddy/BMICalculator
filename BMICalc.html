<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        label {
            display: inline-block;
            width: 120px;
            text-align: right;
            margin-right: 10px;
        }
        input {
            margin: 10px 0;
            padding: 5px;
            width: 200px;
        }
        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>BMI Calculator</h1>
    
    <form id="bmiForm" onsubmit="calculateBMI(this);">
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" name="weight" required step="0.1" min="1"><br>
        
        <label for="height">Height (cm):</label>
        <input type="number" id="height" name="height" required min="50" max="250"><br>
        
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required min="1" max="120"><br>
        
        <button type="submit">Calculate BMI</button>
    </form>

    <h2 id="result">Your BMI will be displayed here</h2>

    <script>
        function calculateBMI(myform) {
            event.preventDefault();

            const weight = parseFloat(myform.weight.value);
            const height = parseFloat(myform.height.value);
            const age = parseInt(myform.age.value);

            const bmi = (weight * 10000) / (height * height);

            let resultText = `Your BMI is: ${bmi.toFixed(1)}`;
            
            // BMI-Categories
            if (bmi < 18.5) {
                resultText += " (Underweight)";
            } else if (bmi >= 18.5 && bmi < 25) {
                resultText += " (Normalweight)";
            } else if (bmi >= 25 && bmi < 30) {
                resultText += " (Overweight)";
            } else {
                resultText += " (Obesity)";
            }

            resultText += `<br>Age: ${age} years old`;

            // result is displayed in the HTML element with id 'result'
            document.getElementById('result').innerHTML = resultText;
        }
    </script>
</body>
</html>
